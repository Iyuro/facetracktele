# dlib/face_recognition dinonaktifkan dari requirements.txt, jadi build
# nggak butuh cmake/gcc lagi. File ini dibiarkan minimal — nixpacks
# otomatis detect Python project dan install dari requirements.txt.
#
# tesseract-ocr ditambahin di sini karena itu binary system-level (bukan
# pip package) yang dibutuhin fitur OCR (pytesseract cuma wrapper-nya).
#
# PENTING: pakai aptPkgs, BUKAN nixPkgs. Kalau nixPkgs di-set manual di
# phase [setup], itu REPLACE seluruh paket yang auto-detect Nixpacks
# (termasuk Python runtime-nya sendiri) — bikin build gagal dengan error
# "python: command not found" pas pip install. aptPkgs cuma NAMBAH paket
# system via apt tanpa ganggu environment Python yang udah dideteksi.

[phases.setup]
aptPkgs = ["tesseract-ocr", "tesseract-ocr-ind"]

[start]
cmd = "python bot.py"
